services:
  database:
    image: postgres:16
    container_name: finance_ai-db
    environment:
      POSTGRES_DB: finance_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - operation_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bytebank-net
networks:
  bytebank-net:
    external: true

volumes:
  operation_data: